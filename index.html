<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Jai Club Official | Premium Signals Group</title>
  
  <!-- Google Fonts + Font Awesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* FULL MOBILE SCREEN — NO PHONE CARD LAYOUT */
    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0a12, #030308);
      font-family: 'Inter', 'Poppins', sans-serif;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 0;
      margin: 0;
      position: relative;
    }

    /* animated background grain + soft glow — full bleed */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 40% 50%, rgba(106, 92, 255, 0.08), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.03"><path fill="none" stroke="%23ffffff" stroke-width="0.5" d="M30 10 L170 10 M10 30 L190 30 M10 70 L190 70 M10 110 L190 110 M10 150 L190 150 M10 190 L190 190 M50 10 L50 190 M90 10 L90 190 M130 10 L130 190 M170 10 L170 190"/></svg>');
      background-repeat: repeat;
      background-size: 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* FULL-WIDTH CONTAINER — NO CARD BORDERS */
    .container {
      width: 100%;
      max-width: 100%;
      background: rgba(12, 12, 22, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 0;
      padding: 1.8rem 1.5rem 2.2rem;
      box-shadow: none;
      transition: all 0.2s ease;
      animation: fadeSlideUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      position: relative;
      z-index: 2;
      border: none;
    }

    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .container:hover {
      border: none;
      box-shadow: none;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFFFFF, #b7b0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      margin-bottom: 0.25rem;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    /* ========= LIVE PULSE RINGS (DYNAMIC) ========= */
    .logo-live-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0.5rem 0 1rem 0;
      position: relative;
    }

    .logo-ring-container {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: linear-gradient(145deg, #6a5cff, #3b2ee0);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      box-shadow: 0 15px 30px rgba(106, 92, 255, 0.35), 0 0 0 2px rgba(255, 255, 255, 0.1);
      transition: transform 0.2s ease, box-shadow 0.2s;
      position: relative;
      z-index: 10;
    }

    .logo:active {
      transform: scale(0.98);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      background: #0f0f17;
    }

    /* Expanding rings — live effect (5 layers) */
    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      background: transparent;
      border: 2px solid rgba(106, 92, 255, 0.7);
      box-shadow: 0 0 12px rgba(106, 92, 255, 0.5);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulseRing 2.2s infinite ease-out;
      opacity: 0;
      z-index: 1;
    }

    .ring-1 {
      width: 140px;
      height: 140px;
      border-width: 2px;
      animation-delay: 0s;
      border-color: rgba(106, 92, 255, 0.8);
    }
    .ring-2 {
      width: 160px;
      height: 160px;
      border-width: 1.8px;
      animation-delay: 0.5s;
      border-color: rgba(106, 92, 255, 0.65);
    }
    .ring-3 {
      width: 180px;
      height: 180px;
      border-width: 1.6px;
      animation-delay: 1s;
      border-color: rgba(0, 198, 255, 0.55);
    }
    .ring-4 {
      width: 200px;
      height: 200px;
      border-width: 1.4px;
      animation-delay: 1.5s;
      border-color: rgba(106, 92, 255, 0.45);
    }
    .ring-5 {
      width: 220px;
      height: 220px;
      border-width: 1.2px;
      animation-delay: 1.9s;
      border-color: rgba(0, 198, 255, 0.35);
    }

    @keyframes pulseRing {
      0% {
        opacity: 0.7;
        transform: translate(-50%, -50%) scale(0.92);
      }
      50% {
        opacity: 0.5;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.45);
      }
    }

    /* official badge + live indicator */
    .tag {
      background: rgba(106, 92, 255, 0.2);
      backdrop-filter: blur(4px);
      padding: 0.5rem 1.3rem;
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      border: 0.5px solid rgba(106, 92, 255, 0.6);
      color: #e0dbff;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #1effbc;
      border-radius: 50%;
      box-shadow: 0 0 8px #1effbc;
      animation: softPulse 1.2s infinite alternate;
      margin-right: 4px;
    }

    @keyframes softPulse {
      0% { opacity: 0.5; transform: scale(0.9);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    .main-text {
      font-size: 2.1rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 0.8rem 0 1rem;
      background: linear-gradient(115deg, #FFFFFF, #D9D2FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
      letter-spacing: -0.2px;
    }

    .highlight-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 20px 0 24px;
    }

    .highlight {
      background: rgba(28, 28, 38, 0.8);
      backdrop-filter: blur(4px);
      padding: 1rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .highlight i {
      font-size: 1.3rem;
      color: #8f83ff;
    }

    .highlight:active {
      background: rgba(106, 92, 255, 0.25);
      transform: scale(0.99);
    }

    .btn-telegram {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(95deg, #6a5cff, #3f9eff);
      color: white;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.2rem;
      padding: 1rem 1.2rem;
      border-radius: 60px;
      margin: 0.8rem 0 1rem;
      transition: all 0.25s ease;
      box-shadow: 0 10px 24px rgba(106, 92, 255, 0.45);
      border: none;
      letter-spacing: 0.5px;
      width: 100%;
      text-align: center;
    }

    .btn-telegram i {
      font-size: 1.5rem;
      transition: transform 0.2s;
    }

    .btn-telegram:active {
      transform: scale(0.97);
      box-shadow: 0 5px 15px rgba(106, 92, 255, 0.5);
    }

    .ads {
      font-size: 0.75rem;
      color: #b0abda;
      background: rgba(0, 0, 0, 0.35);
      padding: 0.7rem 1rem;
      border-radius: 2rem;
      margin-top: 0.8rem;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    .ads a {
      color: #c5bdff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .ads a:active {
      color: white;
    }

    .footer {
      font-size: 0.72rem;
      color: #b4afda;
      line-height: 1.45;
      margin-top: 1.5rem;
      border-top: 1px dashed rgba(106, 92, 255, 0.4);
      padding-top: 1.2rem;
      text-align: center;
    }

    .container {
      --x-pos: 50%;
      --y-pos: 50%;
      position: relative;
      background: rgba(12, 12, 22, 0.92);
    }
    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at var(--x-pos, 50%) var(--y-pos, 50%), rgba(106, 92, 255, 0.1), transparent 75%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: -1;
    }
    .container:hover::before {
      opacity: 1;
    }

    /* Responsive: perfect for mobile Chrome */
    @media (max-width: 560px) {
      .container {
        padding: 1.4rem 1.2rem 1.8rem;
      }
      .main-text {
        font-size: 1.75rem;
      }
      .btn-telegram {
        font-size: 1.05rem;
        padding: 0.85rem 1rem;
      }
      .highlight {
        padding: 0.85rem 1rem;
        font-size: 0.92rem;
      }
      h1 {
        font-size: 1.9rem;
      }
      .logo-ring-container {
        width: 120px;
        height: 120px;
      }
      .logo {
        width: 110px;
        height: 110px;
      }
      .ring-1 { width: 120px; height: 120px; }
      .ring-2 { width: 138px; height: 138px; }
      .ring-3 { width: 156px; height: 156px; }
      .ring-4 { width: 174px; height: 174px; }
      .ring-5 { width: 192px; height: 192px; }
    }

    @media (max-width: 400px) {
      .container {
        padding: 1.2rem 1rem;
      }
      .main-text {
        font-size: 1.55rem;
      }
      .logo-ring-container {
        width: 100px;
        height: 100px;
      }
      .logo {
        width: 92px;
        height: 92px;
      }
      .ring-1 { width: 100px; height: 100px; }
      .ring-2 { width: 116px; height: 116px; }
      .ring-3 { width: 132px; height: 132px; }
      .ring-4 { width: 148px; height: 148px; }
      .ring-5 { width: 164px; height: 164px; }
      .tag {
        font-size: 0.68rem;
        padding: 0.4rem 1rem;
      }
      .btn-telegram {
        font-size: 1rem;
        gap: 8px;
      }
    }

    .btn-telegram, .highlight, .ads a, .tag {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    img {
      display: block;
      max-width: 100%;
    }
  </style>
</head>
<body>

<script>
  (function() {
    const container = document.querySelector('.container');
    if(container) {
      document.addEventListener('mousemove', function(e) {
        const rect = container.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        container.style.setProperty('--x-pos', `${x}%`);
        container.style.setProperty('--y-pos', `${y}%`);
      });
    }
  })();
</script>

</body>
</html>
